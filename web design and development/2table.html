<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make 2 tables</title>
    <link rel="stylesheet" href="2tablestyle.css">
</head>
<body>
    <section class="Tables-section">
        <table class="Tables">
            <h2>Table 1</h2>
            <tbody>
                <tr>
                    <td>4COSC011W Assessment</td>
                    <td>%</td>
                </tr>
                <tr>
                    <td>Coursework</td>
                    <td>50%</td>
                </tr>
                <tr>
                    <td>Examination</td>
                    <td>50%</td>
                </tr>
            </tbody>
        </table>
    </section>
    <section class="Tables-section">
        <table class="Tables">
        <h2>Table 2</h2>
            <tbody>
                <tr>
                    <td>item1</td>
                    <td colspan="2">item2 </td>
                </tr>
                <tr>
                    <td rowspan="2">item3</td>
                    <td>item4</td>
                    <td>item5</td>
                </tr>
            </tbody>
    </section>
    <section class="Tables-section">
        <table class="Tables">
        <h2>Table 3</h2>
            <tbody>
                <tr>
                    <td rowspan="2">Item 1</td>
                    <td> Item 2</td>
                    <td>Item 3</td>
                    <td>Item 4</td>
                </tr>
                <tr>
                    <td>Item 5</td>
                    <td>Item 6</td>
                    <td>Item 7</td>
                </tr>
            </tbody>
        </table>
    </section>
    <section>
        <table class="Tables">
        <h2>Table 4</h2>
            <tbody>
                <tr>
                    <td colspan="5">Academic Year</td>
                </tr>
                <tr>
                    <td>Sem 1</th>
                    <td>4COSC001W</td>
                    <td rowspan="2">4COSC002W</td>
                    <td rowspan="2">4COSC003W</td>
                    <td rowspan="2">4COSC004W</td>
                </tr>
                <tr>
                    <td>Sem 2</td>
                    <td>4COSC005W</td>
                </tr>
            </tbody>
        </table>
    </section>
</body>
</html>
