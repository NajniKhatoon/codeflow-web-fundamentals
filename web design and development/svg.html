<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Shapes</title>
</head>
<body>

    <section class="card">
        <h2>1. Responsive ViewBox & Basics</h2>
        <svg viewBox="0 0 200 100" 
            preserveAspectRatio="xMidYMid meet" width="30%">
            <rect width="100%" height="100%" fill="lavender" />
            <circle cx="100" cy="50" r="45" fill="purple" />
            <text x="100" y="60" font-size="30" 
                text-anchor="middle" fill="white">SVG</text>
        </svg>
    </section>


    <section class="card">
        <h2>2. Rectangles()</h2>
        <svg width="300" height="120">
            <rect x="10" y="30" width="60" height="60" 
                stroke="purple" fill="transparent" stroke-width="2" />

            <rect x="90" y="30" rx="15" ry="15" width="60" height="60" 
                stroke="purple" fill="lavender" stroke-width="2" />
        
            <rect x="170" y="30" width="90" height="60" 
                fill="purple" stroke="black" stroke-dasharray="5,3" 
                stroke-width="2" />
        </svg>
    </section>
    
    <section class="card">
    <h2>3. Circles & Ellipses (, )</h2>
    <svg width="750" height="180">

    <circle cx="120" cy="80" r="25" 
        stroke="purple" fill="transparent" stroke-width="2" />

    <circle cx="120" cy="60" r="12" 
        fill="purple" />

    <ellipse cx="220" cy="60" rx="50" ry="25" 
        stroke="purple" fill="transparent" 
        stroke-width="2" />

    <g transform="translate(320,10)">
        <circle r="50" cx="50" cy="50" fill="yellow" 
                stroke="black" stroke-width="2" />
        <ellipse rx="8" ry="12" fill="black" cx="35" cy="35" />
        <ellipse rx="8" ry="12" fill="black" cx="65" cy="35" />
        <path d="M25,70 A25,20 0 0,0 75,70" 
              fill="none" stroke="black" stroke-width="3" />
    </g>

    <circle id="myCircle" 
        cx="70" cy="50" r="40" 
        stroke="black" fill="lightblue"/>

    <use href="#myCircle" x="520" y="70"/>
    <use href="#myCircle" x="620" y="70" fill="purple"/>
    <use href="#myCircle" x="570" y="130" fill="red"/>

    </svg>
    </section>

    <section class="card">
        <h2>4. Lines & Polylines (, )</h2>
        <svg width="350" height="120">

            <line x1="20" y1="90" 
                  x2="100" y2="30" 
                  stroke="purple" 
                  stroke-width="3" />

            <polyline points="130,90 150,30 170,90 190,30 210,90"
                fill="none"
                stroke="purple"
                stroke-width="3" />

            <polyline points="230,90 300,90 300,40 260,40"
                fill="none"
                stroke="purple"
                stroke-width="3" />
        </svg>
    </section>


    <section class="card">
        <h2>5. Polygons()</h2>
        <svg width="350" height="140">

            <!-- Triangle -->
            <polygon points="40,110 80,40 120,110"
                fill="lavender"
                stroke="purple"
                stroke-width="2" />

            <!-- Star -->
            <polygon points="180,40 190,75 225,75 195,95 
                             205,130 180,110 155,130 
                             165,95 135,75 170,75"
                fill="purple"
                stroke="black"
                stroke-width="2" />

            <!-- Hexagon -->
            <polygon points="260,70 280,40 320,40 
                             340,70 320,100 280,100"
                fill="transparent"
                stroke="purple"
                stroke-width="2" />
        </svg>
    </section>

</body>
</html>
