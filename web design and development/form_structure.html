<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Stucture</title>
    <link rel="stylesheet" href="form_structure.css">
</head>
<body>
    <section class="card">
        <form action="" method="post">
            <fieldset>
                <legend>Account Information</legend>
                <br>
		        <label for="name">Username:</label>
                <span aria-hidden="true">*</span></label>
                <input type="text" name="name" id="name" required placeholder="e.g.Class b05">
                <br></br>
                <label for="password">Password:</label>
                <input type="text" name="Password" id="password">
                <span id="password">Must be at least 8 characters</span>
                <br></br>
                <label for="passcode">Passcode:</label>
                <input type="text" name="Passcode" id="passcode">
            </fieldset>
            
            <fieldset>
                <legend>Personal Details</legend>
                <br>
                <label for="age">Age:</label>
                <input type="number" id="age" name="age"
                min="12" max="100" step="1">
                <br></br>
                <label for="Birth Date">Birth Date:</label>
                <input type="date" id="birth date" name="birth date">
                <br></br>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" aria-describedby="email-hint">
                <br></br>
                <label for="test">Test:</label>
                <input type="number" id="test" name="test"
                min="1" max="100" step="1">
            </fieldset>

            <fieldset>
                <legend>Preferences</legend>
                <br>
                <label for="account type">Account Type:</label>
                <input type="radio" name="account type" id="Personal" value="" checked>
                <label for="Personal">Personal</label>
                <input type="radio" name="account type" id="Bussiness" value="">
                <label for="Bussiness">Bussiness</label>
                <br></br>
                <label for="country">Country:</label>
                <select name="country" id="country">
                    <option value="USA">USA</option>
                    <option value="USA">UK</option>
                    <option value="USA">Nepal</option>
                    <option value="USA">Canada</option>
                </select>
                <br></br>
                <input type="checkbox" name="subscribe" id="subscribe"
                value="Subscribe">
                <label for="subscribe">Subscribe to newsletter?</label>
            </fieldset>

            <fieldset>
                <legend>Additional Info</legend>
                <br>
                <label for="upload">Upload Profile Picture:</label>
                <input type="file" id="documents"
                        name="documents[]" multiple
                        accept=".pdf,.doc,.docx,.jpeg,.png">
                <br></br>
                <input type="hidden" name="postId" value="1234">
                <lable for="content">Short Bio:</lable><br>
                <textarea id="content" name="content" rows="5" cols="30" placeholder="Tell us something about yourself"></textarea>
                </textarea><br>
                <input type="submit" name="send" value="Send Post">
            </fieldset>
        </form>
    </section><br></br>
    <button type="button">Reset Form</button>
    <button type="button">Submit</button>

</body>
</html>
